<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>CWN Batches Portal</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#764ba2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CWN Batches">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      gap: 16px;
    }
    .logo {
      width: 80px;
      height: 80px;
      background: white;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 800;
      color: #764ba2;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      margin-bottom: 8px;
    }
    .title {
      font-size: 1.4rem;
      font-weight: 700;
      color: white;
    }
    .subtitle {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.8);
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 8px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    iframe {
      display: none;
      width: 100%;
      height: 100vh;
      border: none;
      position: fixed;
      top: 0;
      left: 0;
    }
    #installBanner {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border-radius: 16px;
      padding: 14px 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      z-index: 9999;
      width: 90%;
      max-width: 400px;
      align-items: center;
      gap: 12px;
    }
    #installBanner .icon {
      width: 44px;
      height: 44px;
      background: #764ba2;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 800;
      font-size: 1rem;
      flex-shrink: 0;
    }
    #installBanner .text { flex: 1; }
    #installBanner .text p { font-size: 0.8rem; color: #636e72; margin: 0; }
    #installBanner .text b { font-size: 0.9rem; color: #2d3436; }
    #installBanner button {
      background: #764ba2;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      flex-shrink: 0;
    }
    #installBanner .close {
      background: none;
      color: #b2bec3;
      padding: 4px 8px;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loader">
    <div class="logo">CWN</div>
    <div class="title">CWN Batches Portal</div>
    <div class="subtitle">Loading your portal...</div>
    <div class="spinner"></div>
  </div>

  <!-- Install Banner -->
  <div id="installBanner">
    <div class="icon">CWN</div>
    <div class="text">
      <b>Install CWN Batches</b>
      <p>Add to home screen for quick access</p>
    </div>
    <button onclick="installApp()">Install</button>
    <button class="close" onclick="hideBanner()">✕</button>
  </div>

  <!-- Main App iframe -->
  <iframe 
    id="appFrame"
    src="https://script.google.com/macros/s/AKfycbycqorKntAlIqHdOvqZFZ_TUK_OuOFETqP9PNSMrPXM83vH_9dCg3V6r4nejVMA7UllbA/exec"
    allow="camera; microphone"
    allowfullscreen>
  </iframe>

<script>
  // App Script URL — YAHAN APNA URL DAALO
  const APP_URL = "https://script.google.com/macros/s/AKfycbycqorKntAlIqHdOvqZFZ_TUK_OuOFETqP9PNSMrPXM83vH_9dCg3V6r4nejVMA7UllbA/exec";

  // iframe load hone par loader hide karo
  const frame = document.getElementById('appFrame');
  frame.onload = function() {
    document.getElementById('loader').style.display = 'none';
    frame.style.display = 'block';
  };

  // 8 second timeout — agar load na ho
  setTimeout(() => {
    document.getElementById('loader').style.display = 'none';
    frame.style.display = 'block';
  }, 8000);

  // PWA Install Logic
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    // 3 second baad install banner dikhao
    setTimeout(() => {
      document.getElementById('installBanner').style.display = 'flex';
    }, 3000);
  });

  function installApp() {
    if(deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(() => {
        deferredPrompt = null;
        hideBanner();
      });
    }
  }

  function hideBanner() {
    document.getElementById('installBanner').style.display = 'none';
  }

  // Service Worker register karo
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
</script>
</body>
</html>
